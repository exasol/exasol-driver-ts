name: Pull Request
on:
  pull_request:
jobs:
  distributed-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ['lint:ci', 'test:dom', 'test:node', 'itest:dom', 'build']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.target }}

  integration-test-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    env:
      DEFAULT_NODE_VERSION: '24'
    name: Node ${{ matrix.node }} integration test
    steps:
      - uses: actions/checkout@v6
      - name: Setup node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Run audit
        if: ${{ matrix.node == env.DEFAULT_NODE_VERSION }}
        run: npm audit
      - run: npm run itest:dom

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [distributed-tasks, integration-test-node]
    steps:
      - run: echo "All checks passed, build successful!"
