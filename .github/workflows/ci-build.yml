name: Main
on:
  push:
    branches:
      - main
jobs:
  distributed-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        target: ['lint:ci', 'test:dom', 'test:node', 'itest:dom', 'itest:node', 'build']
    env:
      DEFAULT_TARGET: 'test:node'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run ${{ matrix.target }}
      - name: Run audit
        if: ${{ matrix.target == env.DEFAULT_TARGET }}
        run: npm run audit
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        if: ${{ matrix.target == env.DEFAULT_TARGET && env.SONAR_TOKEN != null }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
